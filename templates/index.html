<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore and filter Google Cloud BigQuery release notes in a clean, modern, and interactive timeline dashboard.">
  <title>BigQuery Release Notes Explorer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="shortcut icon" href="https://www.gstatic.com/images/branding/product/1x/bigquery_64dp.png" type="image/png">
  <!-- JavaScript -->
  <script defer src="/static/js/app.js"></script>
</head>
<body class="dark-theme">
  <!-- Dynamic Glowing Background Orbs -->
  <div class="bg-glow-container" aria-hidden="true">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo-area">
          <img src="https://www.gstatic.com/images/branding/product/2x/bigquery_64dp.png" alt="BigQuery Logo" class="bq-logo" id="bqLogo">
          <div class="title-group">
            <h1 class="main-title">BigQuery Release Notes</h1>
            <p class="subtitle">Interactive dashboard and timeline of official updates</p>
          </div>
        </div>
        
        <div class="header-actions">
          <button id="themeToggle" class="btn-icon" aria-label="Toggle light and dark theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
          <button id="exportCsvBtn" class="btn-secondary" aria-label="Export notes to CSV">
            <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            <span>Export CSV</span>
          </button>
          <button id="refreshBtn" class="btn-primary" aria-label="Force refresh feed cache">
            <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
            <span>Sync Live</span>
          </button>
        </div>
      </div>

      <!-- Quick Metrics Dashboard -->
      <div class="metrics-grid" id="metricsGrid">
        <div class="metric-card loading-skeleton"></div>
        <div class="metric-card loading-skeleton"></div>
        <div class="metric-card loading-skeleton"></div>
        <div class="metric-card loading-skeleton"></div>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-main">
      <!-- Sidebar / Filters -->
      <aside class="filters-sidebar">
        <div class="sidebar-sticky">
          <!-- Search Box -->
          <div class="filter-section">
            <label for="searchInput" class="section-label">Search Updates</label>
            <div class="search-wrapper">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="searchInput" placeholder="Search keyword, feature..." autocomplete="off">
              <button id="clearSearch" class="clear-btn" aria-label="Clear search text">&times;</button>
            </div>
          </div>

          <!-- Tabs: Timeline vs Bookmarks -->
          <div class="view-tabs">
            <button id="tabTimeline" class="tab-btn active" data-view="all">
              All Release Notes
            </button>
            <button id="tabBookmarks" class="tab-btn" data-view="bookmarks">
              Bookmarked (<span id="bookmarkCount">0</span>)
            </button>
          </div>

          <!-- Category Filter -->
          <div class="filter-section" id="categoryFilterSection">
            <h2 class="section-label">Filter by Category</h2>
            <div class="category-filters" id="categoryFilters">
              <!-- Dynamically populated categories -->
              <div class="filter-pill-loader loading-skeleton"></div>
              <div class="filter-pill-loader loading-skeleton"></div>
              <div class="filter-pill-loader loading-skeleton"></div>
            </div>
          </div>

          <!-- Time Range Filter -->
          <div class="filter-section">
            <label for="timeFilter" class="section-label">Timeframe</label>
            <select id="timeFilter" class="select-dropdown">
              <option value="all">All Time</option>
              <option value="30">Last 30 Days</option>
              <option value="90">Last 90 Days</option>
              <option value="180">Last 180 Days</option>
              <option value="365">Last Year</option>
            </select>
          </div>

          <!-- Sorting -->
          <div class="filter-section">
            <label for="sortOrder" class="section-label">Sort Order</label>
            <select id="sortOrder" class="select-dropdown">
              <option value="desc">Newest First</option>
              <option value="asc">Oldest First</option>
            </select>
          </div>

          <!-- Cache Status Info -->
          <div class="cache-status-card" id="cacheStatusCard">
            <div class="status-indicator">
              <span class="status-dot"></span>
              <span class="status-text">Checking status...</span>
            </div>
            <p class="status-time">Last checked: --:--</p>
          </div>
        </div>
      </aside>

      <!-- Timeline Feed -->
      <section class="timeline-container" aria-label="BigQuery Release Notes Timeline">
        <div class="timeline-line"></div>
        <div class="timeline-feed" id="timelineFeed">
          <!-- Loading state skeleton cards -->
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Data fetched from official <a href="https://docs.cloud.google.com/feeds/bigquery-release-notes.xml" target="_blank" rel="noopener noreferrer">Google Cloud Feed</a>.</p>
      <p>BigQuery Release Notes Explorer &copy; 2026. Made with Flask &amp; Vanilla Web Technologies.</p>
    </footer>
  </div>

  <!-- Toast Notification System -->
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
